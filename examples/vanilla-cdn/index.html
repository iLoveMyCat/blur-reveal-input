<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blur Reveal Input - Vanilla CDN Example</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 500px;
      margin: 4rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.5rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #e1e5eb;
      border-radius: 8px;
      margin-top: 0.5rem;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
    }
    .info {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f0f7ff;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Vanilla CDN Example</h1>
  <p>Just a script tag — no build step, no npm. All password inputs are automatically enhanced.</p>

  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="Type something, then hover to reveal...">

  <div class="info">
    <strong>How it works:</strong> The script tag below auto-applies the blur effect
    to every <code>&lt;input type="password"&gt;</code> on the page.
  </div>

  <!-- This single line is all you need -->
  <script src="../../dist/blur-reveal-input.min.js"></script>
</body>
</html>
